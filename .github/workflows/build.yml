name: Build RB450Gx4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout RB450Gx4 branch
        uses: actions/checkout@v4
        with:
          repository: FujitsuRo/openwrt
          ref: RB450Gx4-rebase-sdhci
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget \
            libelf-dev perl patch diffutils bzip2 ccache

      - name: Create .config
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_ipq40xx=y
          CONFIG_TARGET_ipq40xx_DEVICE_mikrotik_rb450gx4=y
          CONFIG_PACKAGE_luci=y
          EOF

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Defconfig
        run: |
          make defconfig
          echo "========== CONFIG =========="
          grep CONFIG_TARGET .config || true

      - name: Build
        run: |
          make -j1 V=s

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            bin/targets/**