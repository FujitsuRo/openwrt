name: Build RB450Gx4 Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    env:
      FORCE_UNSAFE_CONFIGURE: 1

    steps:
      - name: Install dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y build-essential gcc g++ clang flex bison gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-distutils python-is-python3 rsync unzip zlib1g-dev file wget libelf-dev perl make patch diffutils bzip2 ca-certificates

      - name: Clone original RB450Gx4 source
        run: |
          git clone --branch RB450Gx4 https://github.com/robimarko/openwrt.git .
          git config --global --add safe.directory /__w/openwrt/openwrt

      - name: Create RB450Gx4 minimal config
        run: |
          printf '%s\n' \
            'CONFIG_TARGET_ipq40xx=y' \
            'CONFIG_TARGET_ipq40xx_DEVICE_mikrotik_rb450gx4=y' \
            'CONFIG_TARGET_DEVICE_ipq40xx_DEVICE_mikrotik_rb450gx4=y' \
            > .config
          cat .config

      - name: Patch old U-Boot mkimage
        run: |
          cat > tools/mkimage/patches/999-fix-u64-conflict.patch <<'EOF'
--- a/include/compiler.h
+++ b/include/compiler.h
@@ -66,8 +66,6 @@
 #ifndef __ASSEMBLY__
 #include <stdint.h>
 typedef uint8_t __u8;
-typedef uint64_t __u64;
-typedef int64_t __s64;
 typedef uint32_t __u32;
 typedef int32_t __s32;
 typedef uint16_t __u16;
EOF

      - name: Defconfig
        run: |
          make defconfig FORCE=1
          grep -E "CONFIG_TARGET|rb450gx4" .config || true

      - name: Build firmware
        run: |
          make -j1 V=s FORCE=1

      - name: Upload firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RB450Gx4-fixed-firmware
          path: |
            bin/targets/**