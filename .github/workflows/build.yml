name: Build RB450Gx4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            build-essential gcc g++ clang flex bison gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-distutils python-is-python3 rsync unzip \
            zlib1g-dev file wget libelf-dev perl make patch diffutils bzip2 ca-certificates

      - name: Clone RB450Gx4 branch
        run: |
          git clone --depth 1 --branch RB450Gx4-rebase-sdhci https://github.com/FujitsuRo/openwrt.git .

      - name: Create RB450Gx4 config
        run: |
          cat > .config <<'EOF'
CONFIG_TARGET_ipq40xx=y
CONFIG_TARGET_ipq40xx_DEVICE_mikrotik_rb450gx4=y
CONFIG_TARGET_DEVICE_ipq40xx_DEVICE_mikrotik_rb450gx4=y
CONFIG_PACKAGE_luci=y
EOF
          cat .config

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Defconfig
        run: |
          export FORCE=1
          make defconfig FORCE=1
          echo "===== FINAL CONFIG TARGET ====="
          grep -E "CONFIG_TARGET|rb450gx4|luci" .config || true

      - name: Build
        run: |
          export FORCE=1
          make -j1 V=s FORCE=1

      - name: Upload firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RB450Gx4-firmware
          path: |
            bin/targets/**