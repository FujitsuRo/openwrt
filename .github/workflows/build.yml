name: Build RB450Gx4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout RB450Gx4 branch
        uses: actions/checkout@v4
        with:
          ref: RB450Gx4-rebase-sdhci
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc g++ clang flex bison gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-distutils python-is-python3 rsync unzip \
            zlib1g-dev file wget libelf-dev perl make patch diffutils bzip2

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure RB450Gx4
        run: |
          FORCE=1 make defconfig

      - name: Build firmware
        run: |
          FORCE=1 make -j2 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RB450Gx4-firmware
          path: |
            bin/targets/**