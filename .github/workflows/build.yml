name: Build RB450Gx4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:18.04

    steps:
      - name: Install dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            build-essential gcc g++ clang flex bison gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            zlib1g-dev file wget libelf-dev perl make patch diffutils bzip2 ca-certificates

          ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone RB450Gx4 branch
        run: |
          git clone --depth 1 --branch RB450Gx4-rebase-sdhci https://github.com/FujitsuRo/openwrt.git .

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure RB450Gx4
        run: |
          make defconfig

      - name: Build firmware
        run: |
          make -j2 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RB450Gx4-firmware
          path: |
            bin/targets/**